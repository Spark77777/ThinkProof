<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reasoning Algebra Exam</title>

    <link rel="stylesheet" href="style.css">

    <!-- math.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.2/math.js"></script>
</head>
<body>

    <div class="container">

        <h1>Application-Based Algebra</h1>

        <div class="question-box">
            <h2>Question 1 of 1</h2>

            <p>
                A startup spends ₹x on advertising and earns ₹(3x - 20).
                If the profit becomes ₹40, find x.
                Show your reasoning step-by-step.
            </p>
        </div>

        <div id="steps-container">
            <div class="step">
                <label>Step 1</label>
                <input type="text" class="step-input" placeholder="Example: 3x - 20 = 40">
            </div>
        </div>

        <button id="add-step-btn">+ Add Step</button>

        <button id="submit-btn">Submit Solution</button>

        <div id="result-box"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
